name: Archive past event flyers

# Runs once every 2 days (and can be run manually).
# It moves flyers whose date has passed into assets/img/events/archive/,
# removes them from the homepage popup and events.html, and adds them to
# past-events.html — then commits the changes. Does nothing if nothing expired.
on:
  schedule:
    - cron: '0 7 */2 * *'   # 07:00 UTC, every 2nd day of the month
  workflow_dispatch:         # lets you run it on-demand from the Actions tab

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Archive past event flyers
        run: node scripts/archive-past-events.mjs

      - name: Commit changes if anything was archived
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "srt-archive-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-archive past event flyers"
            git push
          else
            echo "No past events to archive."
          fi
